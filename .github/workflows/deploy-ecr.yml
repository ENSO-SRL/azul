name: Build, Push & Deploy — ECR → ECS

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"

  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"

  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to ECR? (yes/no)"
        required: true
        default: "yes"

concurrency:
  group: ecr-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-2
  ECR_REGISTRY: 293926505005.dkr.ecr.us-east-2.amazonaws.com
  ECR_REPOSITORY: pago-azul
  # ARN del IAM Role creado con infra/iam_github_oidc_trust.json
  AWS_ROLE_ARN: arn:aws:iam::293926505005:role/GitHubActions-ECR-Deploy

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: SAST + dependency scan (Req 6)
  # ---------------------------------------------------------------------------
  sast:
    name: SAST & Dependency Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install audit tools
        run: pip install bandit pip-audit --quiet

      - name: Bandit — SAST scan
        run: |
          bandit -r app/ routers/ \
            --severity-level medium \
            --confidence-level medium \
            --format txt \
            --exit-zero \
            | tee bandit_report.txt
          echo "### Bandit SAST" >> $GITHUB_STEP_SUMMARY
          cat bandit_report.txt >> $GITHUB_STEP_SUMMARY

      - name: pip-audit — dependency vulnerability scan
        run: |
          pip-audit -r requirements.txt --format markdown | tee pip_audit_report.md || true
          echo "### pip-audit" >> $GITHUB_STEP_SUMMARY
          cat pip_audit_report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload SAST reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: |
            bandit_report.txt
            pip_audit_report.md

  # ---------------------------------------------------------------------------
  # Job 2: Build & Push — usa OIDC, sin claves estáticas (Req 8)
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: sast
    environment: produccion

    # OIDC — sin AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
    # OIDC Provider: arn:aws:iam::293926505005:oidc-provider/token.actions.githubusercontent.com
    # IAM Role:      arn:aws:iam::293926505005:role/GitHubActions-ECR-Deploy
    permissions:
      contents: read
      id-token: write   # requerido para OIDC

    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute push flag
        id: meta
        run: |
          IMAGE_URI="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"

          SHOULD_PUSH="false"
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            SHOULD_PUSH="true"
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.push_image }}" == "yes" ]]; then
            SHOULD_PUSH="true"
          fi

          echo "image_uri=${IMAGE_URI}"     >> $GITHUB_OUTPUT
          echo "should_push=${SHOULD_PUSH}" >> $GITHUB_OUTPUT

          echo "### Image tag" >> $GITHUB_STEP_SUMMARY
          echo "- \`latest\`"               >> $GITHUB_STEP_SUMMARY
          echo "- **Push:** ${SHOULD_PUSH}" >> $GITHUB_STEP_SUMMARY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------------
      # OIDC — asume el IAM Role sin credenciales estáticas
      # -----------------------------------------------------------------------
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # -----------------------------------------------------------------------
      # Build y push — con cache en ECR
      # -----------------------------------------------------------------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ steps.meta.outputs.should_push == 'true' }}
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:buildcache
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:buildcache,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # -----------------------------------------------------------------------
      - name: Job summary
        if: always()
        run: |
          echo "## ECR Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | \`${{ env.ECR_REGISTRY }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Repository | \`${{ env.ECR_REPOSITORY }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ steps.meta.outputs.image_uri }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Auth | OIDC (sin claves estáticas) |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.meta.outputs.should_push }}" == "true" ]]; then
            echo "| Pushed | si — imagen disponible en ECR |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Pushed | no — PR/branch solo valida build |" >> $GITHUB_STEP_SUMMARY
          fi

  # ---------------------------------------------------------------------------
  # Job 3: Force-deploy del servicio ECS (Req CD)
  # Solo se ejecuta cuando la imagen fue realmente pusheada a ECR.
  # ---------------------------------------------------------------------------
  deploy-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: produccion

    # Solo si se hizo push real a ECR:
    #   • push a main
    #   • workflow_dispatch con push_image=yes
    if: |
      needs.build-and-push.outputs.image_uri != '' && (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.push_image == 'yes')
      )

    # OIDC — igual que build-and-push, sin claves estáticas
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new ECS deployment
        id: ecs-deploy
        run: |
          aws ecs update-service \
            --cluster default \
            --service pago-azul-5325 \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }} \
            --output json | jq '{service: .service.serviceName, status: .service.status, desiredCount: .service.desiredCount}'

      - name: Deploy summary
        if: always()
        run: |
          echo "## ECS Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Cluster | \`default\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Service | \`pago-azul-5325\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ needs.build-and-push.outputs.image_uri }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ambiente | produccion |" >> $GITHUB_STEP_SUMMARY
